name: Node CI/CD with Docker Hub

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 🔧 Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🧪 Run tests
        run: npm test || echo "No tests yet"

      - name: 🐳 Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: 📦 Build Docker image (latest + version)
        run: |
          VERSION=$(node -p "require('./package.json').version") # full version e.g. 1.0.3
          echo "Building version v$VERSION"
          docker build -t ${{ secrets.DOCKER_USERNAME }}/test-1:latest \
                       -t ${{ secrets.DOCKER_USERNAME }}/test-1:v$VERSION .

      - name: 🚚 Push Docker images
        run: |
          VERSION=$(node -p "require('./package.json').version")
          docker push ${{ secrets.DOCKER_USERNAME }}/test-1:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/test-1:v$VERSION

